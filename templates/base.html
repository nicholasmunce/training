<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Levitate{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { background: #0d1117; }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .navbar-brand { font-weight: 700; letter-spacing: .05em; font-size: 1.1rem; }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .stat-card .label { font-size: .72rem; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; }
    .stat-card .value { font-size: 1.4rem; font-weight: 700; line-height: 1.2; margin-top: .2rem; }
    .chart-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1rem;
      height: 100%;
    }
    .table { --bs-table-bg: transparent; }
    .table > tbody > tr:hover { background: rgba(255,255,255,.04); cursor: pointer; }
    .badge-sport { font-size: .7rem; font-weight: 500; }
    a { text-decoration: none; }
    a:hover { text-decoration: none; }
    .nav-link.active { color: #fff !important; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand text-white" href="/">⛰ Levitate</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Activities</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-warning" href="/sync" title="Sync from Strava">↻ Sync</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-success alert-dismissible fade show py-2" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
